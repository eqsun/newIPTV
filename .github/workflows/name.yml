name: Spider Jar Gen CI
on:
  workflow_dispatch:
  push:
    branches-ignore:
      - '**'
    users:
      - github_actions

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 11
        uses: actions/setup-java@v4
        with:
          java-version: '11'
          distribution: 'adopt'

      # - name: Build with Gradle
      #   run: ./buildAndGenJar.bat ec

      # 👇 直接推送：jar/custom_spider.jar → 目标仓库 2.jar
      - name: Push to CCSH/Config dev
        uses: peaceiris/actions-gh-pages@v4
        with:
          external_repository: CCSH/Config
          personal_token: ${{ secrets.DEPLOY_TOKEN }}
          publish_dir: ./jar           # 源文件夹
          include: custom_spider.jar   # 只推这一个文件
          publish_branch: dev          # 目标分支
          destination_filename: 2.jar  # 直接重命名为 2.jar ✅
          keep_files: false
          commit_message: "Update to 2.jar"
          user_name: "github-actions[bot]"
          user_email: "github-actions[bot]@users.noreply.github.com"
